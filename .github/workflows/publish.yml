name: "\U0001f680 Publish to PyPI (Trusted Publishing)"

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: "\U0001f9e9 Checkout code"
        uses: actions/checkout@v4

      - name: "\U0001f40d Set up Python 3.13"
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: "\U0001f4e6 Install build, test, and dev tools"
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          pip install .[dev]
          pip install codecov

      - name: "\U0001f9ea Run tests & generate coverage"
        run: pytest --cov=src --cov-report=xml

      - name: "\U0001f4ca Upload coverage reports to Codecov"
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          verbose: true
          fail_ci_if_error: true

      - name: "\u2699\ufe0f Build distribution packages"
        run: python -m build

      - name: "\u2705 Verify distribution"
        run: twine check dist/*

      - name: "\U0001f680 Publish to PyPI (via OIDC)"
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          skip-existing: false
